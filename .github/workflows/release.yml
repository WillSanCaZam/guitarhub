name: Release
on:
  push:
    tags: ['v*']

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

env:
  CARGO_INCREMENTAL: 0
  CARGO_TERM_COLOR: always
  TAURI_SKIP_SIGNING: true

jobs:
  build:
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bundles: deb,appimage
          - os: macos-latest
            target: aarch64-apple-darwin
            bundles: dmg
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libgirepository1.0-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: cargo test --target ${{ matrix.target }}
        working-directory: src-tauri
      - run: npx tauri build --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}
        working-directory: src-tauri
      - name: Sign bundle
        if: env.TAURI_PRIVATE_KEY != ''
        env:
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_PRIVATE_KEY_PASSWORD }}
        working-directory: src-tauri
        run: |
          TARGET="${{ matrix.target }}"
          if [ "${{ runner.os }}" = "Linux" ]; then
            find "target/$TARGET/release/bundle/deb" -name "*.deb" | while read -r f; do
              echo "Signing $f"
              npx tauri signer sign \
                --private-key <(echo "$TAURI_PRIVATE_KEY") \
                --password "$TAURI_PRIVATE_KEY_PASSWORD" \
                "$f"
              # Rename sig to include target triple for platform detection
              dir=$(dirname "$f")
              base=$(basename "$f")
              mv "${f}.sig" "${dir}/${TARGET}-${base}.sig"
            done
          elif [ "${{ runner.os }}" = "macOS" ]; then
            find "target/$TARGET/release/bundle/dmg" -name "*.dmg" | while read -r f; do
              echo "Signing $f"
              npx tauri signer sign \
                --private-key <(echo "$TAURI_PRIVATE_KEY") \
                --password "$TAURI_PRIVATE_KEY_PASSWORD" \
                "$f"
              dir=$(dirname "$f")
              base=$(basename "$f")
              mv "${f}.sig" "${dir}/${TARGET}-${base}.sig"
            done
          fi
      - name: Upload signature
        if: env.TAURI_PRIVATE_KEY != ''
        uses: actions/upload-artifact@v4
        with:
          name: guitarhub-sig-${{ matrix.target }}
          path: src-tauri/target/${{ matrix.target }}/release/bundle/*/*.sig
          if-no-files-found: warn
      - uses: actions/upload-artifact@v4
        with:
          name: guitarhub-${{ matrix.target }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/
          if-no-files-found: error

  create-release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          pattern: guitarhub-*
          merge-multiple: true
      - name: Create or Update Release
        id: create
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          assets=$(find . -maxdepth 4 -type f \( -name "*.deb" -o -name "*.AppImage" -o -name "*.dmg" -o -name "*.msi" -o -name "*.zip" \) 2>/dev/null | head -20)
          if [ -z "$assets" ]; then
            echo "No bundle files found in artifacts"
            find . -type f | head -30
            exit 1
          fi
          if gh release view "${{ github.ref_name }}" &>/dev/null; then
            echo "Release already exists — uploading assets"
            gh release upload "${{ github.ref_name }}" $assets --clobber
          else
            gh release create "${{ github.ref_name }}" \
              --title "GuitarHub ${{ github.ref_name }}" \
              --generate-notes \
              $assets
          fi

  publish-update-endpoint:
    needs: [create-release]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          path: source
      - uses: actions/download-artifact@v4
        with:
          pattern: guitarhub-sig-*
          merge-multiple: true
          path: sig-artifacts
      - name: Check for signature files
        id: check-sigs
        run: |
          sig_count=$(ls -1 sig-artifacts/*.sig 2>/dev/null | wc -l)
          echo "Found $sig_count signature file(s)"
          echo "count=$sig_count" >> "$GITHUB_OUTPUT"
      - name: Generate latest.json
        if: steps.check-sigs.outputs.count != '0'
        run: python source/scripts/generate_latest_json.py ${{ github.ref_name }} sig-artifacts/*.sig
      - name: Skip latest.json (no signatures)
        if: steps.check-sigs.outputs.count == '0'
        run: echo "No signature files found — skipping latest.json generation"
      - uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages
      - name: Publish latest.json
        if: steps.check-sigs.outputs.count != '0'
        run: |
          cp latest.json gh-pages/latest.json
          cd gh-pages
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add latest.json
          git diff --cached --quiet || git commit -m "chore: update latest.json to ${{ github.ref_name }}"
      - name: Push with retry
        if: steps.check-sigs.outputs.count != '0'
        working-directory: gh-pages
        run: |
          for i in 1 2 3; do
            git pull --rebase && git push && break
            sleep 5
          done
