name: Release
on:
  push:
    tags: ['v*']

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

env:
  CARGO_INCREMENTAL: 0
  CARGO_TERM_COLOR: always

jobs:
  build:
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libgirepository1.0-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: cargo test --target ${{ matrix.target }}
        working-directory: src-tauri
      - run: npx tauri build --target ${{ matrix.target }}
        working-directory: src-tauri
      - name: Sign bundle
        env:
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_PRIVATE_KEY_PASSWORD }}
        working-directory: src-tauri
        run: |
          deb_path=$(find "target/${{ matrix.target }}/release/bundle/deb" -name "*.deb" 2>/dev/null | head -1)
          if [ -z "$deb_path" ]; then
            echo "No .deb found for signing"
            exit 1
          fi
          npx tauri signer sign \
            --private-key <(echo "$TAURI_PRIVATE_KEY") \
            --password "$TAURI_PRIVATE_KEY_PASSWORD" \
            "$deb_path"
      - name: Upload signature
        uses: actions/upload-artifact@v4
        with:
          name: guitarhub-sig-${{ matrix.target }}
          path: src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.sig
          if-no-files-found: error
      - uses: actions/upload-artifact@v4
        with:
          name: guitarhub-${{ matrix.target }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/
          if-no-files-found: error

  create-release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          pattern: guitarhub-*
          merge-multiple: true
      - name: Create or Update Release
        id: create
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          assets=$(find . -maxdepth 4 -type f \( -name "*.deb" -o -name "*.AppImage" -o -name "*.dmg" -o -name "*.msi" -o -name "*.zip" \) 2>/dev/null | head -20)
          if [ -z "$assets" ]; then
            echo "No bundle files found in artifacts"
            find . -type f | head -30
            exit 1
          fi
          if gh release view "${{ github.ref_name }}" &>/dev/null; then
            echo "Release already exists — uploading assets"
            gh release upload "${{ github.ref_name }}" $assets --clobber
          else
            gh release create "${{ github.ref_name }}" \
              --title "GuitarHub ${{ github.ref_name }}" \
              --generate-notes \
              $assets
          fi

  publish-update-endpoint:
    needs: [create-release]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          path: source
      - uses: actions/download-artifact@v4
        with:
          pattern: guitarhub-sig-*
          merge-multiple: true
          path: sig-artifacts
      - run: python source/scripts/generate_latest_json.py ${{ github.ref_name }} sig-artifacts/*.sig
      - uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages
      - run: |
          cp latest.json gh-pages/latest.json
          cd gh-pages
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add latest.json
          git diff --cached --quiet || git commit -m "chore: update latest.json to ${{ github.ref_name }}"
      - name: Push with retry
        working-directory: gh-pages
        run: |
          for i in 1 2 3; do
            git pull --rebase && git push && break
            sleep 5
          done
