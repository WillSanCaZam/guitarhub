name: Release
on:
  push:
    tags: ['v*']

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

env:
  CARGO_INCREMENTAL: 0
  CARGO_TERM_COLOR: always
  TAURI_SKIP_SIGNING: true

jobs:
  build:
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libgirepository1.0-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: cargo test --target ${{ matrix.target }}
        working-directory: src-tauri
      - run: npx tauri build --target ${{ matrix.target }}
        working-directory: src-tauri
      - uses: actions/upload-artifact@v4
        with:
          name: guitarhub-${{ matrix.target }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/
          if-no-files-found: error

  create-release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: guitarhub-*
          merge-multiple: true
      - name: Create Release
        id: create
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          assets=$(find . -type f \( -name "*.deb" -o -name "*.AppImage" -o -name "*.dmg" -o -name "*.msi" -o -name "*.zip" -o -name "*.tar.gz" \) 2>/dev/null | head -20)
          if [ -z "$assets" ]; then
            echo "No bundle files found in artifacts"
            find . -type f | head -30
            exit 1
          fi
          gh release create "${{ github.ref_name }}" \
            --title "GuitarHub ${{ github.ref_name }}" \
            --generate-notes \
            $assets

  publish-update-endpoint:
    needs: [create-release]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: gh-pages
      - run: python scripts/generate_latest_json.py ${{ github.ref_name }}
      - run: 'git commit -am "chore: update latest.json to ${{ github.ref_name }}"'
      - name: Push with retry
        run: |
          for i in 1 2 3; do
            git pull --rebase && git push && break
            sleep 5
          done
