name: CI
on: [pull_request]

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: pip install ruff mypy pytest pytest-asyncio jsonschema pip-audit --break-system-packages
      - run: ruff check scraper/
      - run: mypy scraper/ --strict
      - run: pytest scraper/tests/unit scraper/tests/contract -v
      - run: pip-audit -r scraper/requirements.txt

  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo install cargo-audit --locked
      - run: cargo clippy --all-targets -- -D warnings
        working-directory: src-tauri
      - run: cargo test
        working-directory: src-tauri
      - run: cargo audit
        working-directory: src-tauri
