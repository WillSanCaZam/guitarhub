name: CI
on: [pull_request]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # TODO(scraper): Re-add Python job (ruff, mypy, pytest, pip-audit) when
  # scraper/ directory is implemented. Currently blocked by missing scraper.
  #
  # python:
  #   runs-on: ubuntu-latest
  #   timeout-minutes: 10
  #   steps:
  #     - uses: actions/checkout@v4
  #     - run: pip install -r requirements-dev.txt --break-system-packages
  #     - run: ruff check scraper/
  #     - run: mypy scraper/ --strict
  #     - run: pip-audit -r scraper/requirements.txt
  #     - run: pytest scraper/tests/unit scraper/tests/contract -v

  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run test

  rust:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo install cargo-audit --locked
      - run: cargo clippy --all-targets -- -D warnings
        working-directory: src-tauri
      - run: cargo test
        working-directory: src-tauri
      - run: cargo audit
        working-directory: src-tauri
